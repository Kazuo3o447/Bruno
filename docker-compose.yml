version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: bruno-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bruno} -d ${DB_NAME:-bruno_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USER:-bruno}
      POSTGRES_PASSWORD: ${DB_PASS:-bruno_secret}
      POSTGRES_DB: ${DB_NAME:-bruno_trading}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis/redis-stack-server:latest
    container_name: bruno-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/redis-stack.conf
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  api-backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: bruno-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-bruno}
      - DB_PASS=${DB_PASS:-bruno_secret}
      - DB_NAME=${DB_NAME:-bruno_trading}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - FRED_API_KEY=${FRED_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DRY_RUN=${DRY_RUN:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - ./.env:/app/.env:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  worker-backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command: python -m app.worker
    container_name: bruno-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - api-backend
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-bruno}
      - DB_PASS=${DB_PASS:-bruno_secret}
      - DB_NAME=${DB_NAME:-bruno_trading}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - FRED_API_KEY=${FRED_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  bruno-frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: bruno-frontend
    restart: unless-stopped
    depends_on:
      - api-backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api-backend:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
