# Bruno Trading Bot — Redis Persistenz-Konfiguration
# KRITISCH: Ohne AOF gehen alle States bei Crash verloren
# Das betrifft: offene Positionen, Veto-State, GRSS-Cache, CVD

# AOF: Jede Write-Operation wird auf Disk geloggt
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB Snapshot (zusätzlich zum AOF)
save 900 1
save 300 10
save 60 10000

# Pfade (Docker Volume)
dir /data
dbfilename dump.rdb
appendfilename "appendonly.aof"

# Speicher-Limit (verhindert OOM auf dem System)
maxmemory 512mb
maxmemory-policy allkeys-lru
